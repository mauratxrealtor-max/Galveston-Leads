name: Galveston Motivated Seller Scraper

on:
  schedule:
    - cron: "0 7 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  scrape-and-deploy:
    runs-on: ubuntu-22.04
    timeout-minutes: 60
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: scraper/requirements.txt

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 lxml dbfread playwright

      - name: Install Playwright Chromium
        run: python -m playwright install --with-deps chromium

      - name: Run scraper
        run: python scraper/fetch.py
        env:
          PYTHONUNBUFFERED: "1"

      - name: Verify output files
        run: |
          echo "=== dashboard/records.json (first 3 lines) ==="
          head -3 dashboard/records.json
          echo "=== Record count ==="
          python3 -c "import json; d=json.load(open('dashboard/records.json')); print(f'total={d[\"total\"]} with_address={d[\"with_address\"]}')"

      - name: Upload debug artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ava-debug-artifacts
          path: |
            /tmp/ava_*.png
            /tmp/ava_results_*.html
          if-no-files-found: ignore
          retention-days: 7

      - name: Commit updated records
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add dashboard/records.json data/records.json data/ghl_export_*.csv || true
          git diff --staged --quiet && echo "No changes to commit" || git commit -m "chore: update records $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Deploy pages IN THE SAME JOB — avoids race condition with separate job
      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload dashboard to Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: dashboard/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
