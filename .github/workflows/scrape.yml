name: Galveston Motivated Seller Scraper

on:
  schedule:
    - cron: "0 7 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  scrape-and-deploy:
    runs-on: ubuntu-22.04
    timeout-minutes: 60
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: scraper/requirements.txt

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 lxml dbfread playwright

      - name: Install Playwright Chromium
        run: python -m playwright install --with-deps chromium

      - name: Run scraper
        run: python scraper/fetch.py
        env:
          PYTHONUNBUFFERED: "1"

      - name: Verify and show record count
        run: |
          echo "=== dashboard/records.json ==="
          python3 -c "
          import json
          d = json.load(open('dashboard/records.json'))
          print(f'total={d[\"total\"]} with_address={d[\"with_address\"]}')
          if d['records']:
              r = d['records'][0]
              print(f'top: {r.get(\"owner\")} | {r.get(\"cat_label\")} | score={r.get(\"score\")}')
          "

      - name: Commit records to repo
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add -f dashboard/records.json data/records.json
          git add data/ghl_export_*.csv 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "No changes (records identical to last run)"
          else
            git commit -m "records: $(python3 -c "import json; d=json.load(open('dashboard/records.json')); print(f'{d[\"total\"]} leads {d[\"with_address\"]} w/addr')")" 
            git push
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload debug artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ava-debug-artifacts
          path: |
            /tmp/ava_*.png
            /tmp/ava_results_*.html
            dashboard/records.json
          if-no-files-found: ignore
          retention-days: 7

      # Deploy to Pages using the LIVE dashboard/ folder from this run
      # (not a fresh checkout — so it always has the freshly scraped records.json)
      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload dashboard to Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: dashboard/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
