name: Galveston Motivated Seller — Backfill (365 Days)

on:
  workflow_dispatch:
    inputs:
      days_back:
        description: "Days to look back (default: 365)"
        required: false
        default: "365"
        type: string
      chunk_days:
        description: "Days per search window (default: 5)"
        required: false
        default: "5"
        type: string

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "backfill"
  cancel-in-progress: true

jobs:
  backfill-and-deploy:
    runs-on: ubuntu-22.04
    timeout-minutes: 120
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: scraper/requirements.txt

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 lxml dbfread playwright

      - name: Install Playwright Chromium
        run: python -m playwright install --with-deps chromium

      - name: Run backfill scraper
        run: |
          python scraper/backfill.py \
            --days-back ${{ inputs.days_back || '365' }} \
            --chunk-days ${{ inputs.chunk_days || '5' }}
        env:
          PYTHONUNBUFFERED: "1"

      - name: Verify backfill output
        run: |
          python3 -c "
          import json
          d = json.load(open('dashboard/backfill.json'))
          print(f'total={d[\"total\"]} with_address={d[\"with_address\"]}')
          if d['records']:
              r = d['records'][0]
              print(f'top: {r.get(\"owner\")} | {r.get(\"cat_label\")} | score={r.get(\"score\")}')
          "

      - name: Upload debug artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backfill-debug-artifacts
          path: |
            /tmp/ava_*.png
            /tmp/ava_results_*.html
            dashboard/backfill.json
          if-no-files-found: ignore
          retention-days: 14

      - name: Commit backfill results
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add -f dashboard/backfill.json dashboard/backfill.html
          git add data/backfill_latest.json 2>/dev/null || true
          git add data/backfill_*.csv 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            TOTAL=$(python3 -c "import json; d=json.load(open('dashboard/backfill.json')); print(d['total'])")
            git commit -m "backfill: ${TOTAL} leads (${{ inputs.days_back || 365 }} days)"
            git push
            echo "✅ Committed"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload dashboard to Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: dashboard/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
